version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: painrelief-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-painrelief_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-painrelief_ai}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    networks:
      - painrelief-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-painrelief_user} -d ${DB_NAME:-painrelief_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment for production
    # restart: always

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: painrelief-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - painrelief-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment for production
    # restart: always

  # Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: painrelief-app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-painrelief_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      DB_NAME: ${DB_NAME:-painrelief_ai}
      
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Authentication
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      JWT_EXPIRY: ${JWT_EXPIRY:-30d}
      
      # AI Integration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      
      # Email (optional)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      
      # Payment (optional)
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      
      # Cloud Storage (optional)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    
    ports:
      - "5000:5000"
    
    networks:
      - painrelief-network
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - /app/node_modules
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=app"
    
    # Uncomment for production
    # restart: always
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: painrelief-adminer
    ports:
      - "8080:8080"
    networks:
      - painrelief-network
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    # Remove in production
    profiles:
      - dev

  # Optional: pgAdmin for advanced PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: painrelief-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@painrelief.ai
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - painrelief-network
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    # Remove in production
    profiles:
      - dev

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: painrelief-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - painrelief-network
    depends_on:
      - redis
    # Remove in production
    profiles:
      - dev

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: painrelief-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - painrelief-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Only in production
    profiles:
      - prod

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  painrelief-network:
    driver: bridge

# ============================================================================
# USAGE
# ============================================================================
# 
# Development:
#   docker-compose up
#   docker-compose up --profile dev (includes admin tools)
#   docker-compose logs -f app
# 
# Production:
#   docker-compose --profile prod up -d
#   docker-compose ps
#   docker-compose logs app
# 
# Database management:
#   Access pgAdmin: http://localhost:5050
#   Access Adminer: http://localhost:8080
#   Access Redis Commander: http://localhost:8081
# 
# Stop containers:
#   docker-compose down
#   docker-compose down -v (also remove volumes)
#
# ============================================================================
